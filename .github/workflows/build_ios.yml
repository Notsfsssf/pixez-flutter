name: Build IOS

on:
  workflow_dispatch:

jobs:
  Build_IOS:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get app dependencies
        run: flutter pub get

      - name: Get rhttp dependencies
        working-directory: plugins/rhttp
        run: flutter pub get

      - name: Generate rhttp freezed files
        working-directory: plugins/rhttp
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate app files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create Payload directory and move Runner.app
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload

      - name: Zip ipa
        run: |
          cd build/ios/iphoneos
          zip -r pixez-ios.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: pixez-ios.ipa
          path: build/ios/iphoneos/pixez-ios.ipa
